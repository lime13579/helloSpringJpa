<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em; box-sizing: border-box; }
        input[type="text"]:focus { border-color: #4a90d9; outline: none; }
        .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; }
        .btn-submit { padding: 10px 24px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        .btn-submit:hover { background: #357abd; }
        .nav-link { margin-bottom: 16px; display: inline-block; color: #4a90d9; text-decoration: none; }
        .nav-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a class="nav-link" th:href="@{/categories}">&larr; 카테고리 목록으로</a>
    <h1>카테고리 등록</h1>

    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">카테고리 이름</label>
            <input type="text" th:field="*{name}" placeholder="카테고리 이름을 입력하세요"/>
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">오류 메시지</span>
        </div>
        <button type="submit" class="btn-submit">등록</button>
    </form>

    <!-- 실습 증적 footer -->
    <footer style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-top: 2px solid #4a90d9; text-align: center; color: #555; font-size: 0.9em;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss')}">실습 수행 일시</p>
        <p>학번: 2171183 │ 성명: 이승비</p>
    </footer>

</body>
</html>
